          printf '%s\n' '{"AccountTag":"4512525ee1733958c4d1107b23d467bb","TunnelSecret":"1PjDvLzk/n1kU5OFGXYPUiEptK9JoH43c3iQxzg86lk=","TunnelID":"2e48f3f0-53d8-45da-a7a5-a579dab431ce","Endpoint":""}' > /home/runner/.cloudflared/2e48f3f0-53d8-45da-a7a5-a579dab431ce.json
